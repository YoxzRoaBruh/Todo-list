<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Fondo.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="blob b1"></div>
    <div class="blob b2"></div>

    <div id="tema-oceano" class="dynamic-bg active-bg">
        <div class="burbujas">
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>

    <div id="tema-lluvia" class="dynamic-bg">
        <div class="shuvia"></div>
    </div>

    <div id="tema-nieve" class="dynamic-bg">
        <div class="Lluvia-nieve"></div>
        <div class="muñeco-contenedor">
            <div class="cuerpo base"></div>
            <div class="cuerpo medio"></div>
            <div class="cuerpo cabeza">
                <div class="ojo ojo-izq"></div>
                <div class="ojo ojo-der"></div>
                <div class="nariz"></div>
            </div>
            <div class="sombrero"></div><div class="bufanda"></div>
        </div>
        <div class="suelo-nieve"></div>
    </div>

    <button id="theme-btn" onclick="openThemeModal()" title="Cambiar Entorno">🎨</button>

    <div class="glass-container">
        <header>
            <h1>Flow Tasks</h1>
        </header>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="¿Qué vamos a hacer hoy?">
                <button id="add-btn">CREAR</button>
            </div>
            <div id="char-count" class="char-count">0 / 100</div>
            
            <div class="selectors-row">
                <select id="category-select" class="compact-select">
                    <option value="📚 Estudios">📚 Estudios</option>
                    <option value="🏠 Hogar">🏠 Hogar</option>
                    <option value="💼 Trabajo">💼 Trabajo</option>
                </select>

                <select id="priority-select" class="compact-select">
                    <option value="Alta">🔴 Alta</option>
                    <option value="Media" selected>🟡 Media</option>
                    <option value="Baja">🟢 Baja</option>
                </select>
                
                <button id="filter-btn" class="toggle-filter">Incompletas</button>
                <button id="view-btn" class="toggle-view">⊞</button>
            </div>
        </div>

        <div class="folder-header">
            <button onclick="openFolderManager()" class="btn-folder-manager">📂 Mis Carpetas</button>
        </div>

        <main id="todo-list" class="task-list"></main>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Detalles de Tarea</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="folder-modal" class="modal">
        <div class="folder-modal-content">
            <h3>Nueva Carpeta</h3>
            <label>Nombre de la carpeta:</label>
            <input id="folder-name-input" type="text" maxlength="30" class="folder-input">

            <h4>Seleccionar tareas:</h4>
            <div id="folder-task-list" class="folder-task-list"></div>

            <div class="folder-modal-buttons">
                <button id="folder-create-btn" class="folder-btn-create">Crear</button>
                <button id="folder-cancel-btn" class="folder-btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="folder-manager-modal" class="modal">
        <div class="modal-content glass-card folder-manage-content">
            <div class="modal-header">
                <h2>Gestión de Carpetas</h2>
                <span class="close-btn" onclick="closeFolderManager()">&times;</span>
            </div>
            <div id="folder-manager-list" class="folder-grid"></div>
            <button onclick="createFolder()" class="btn-create-large">+ Crear Nueva Carpeta</button>
        </div>
    </div>

    <div id="delete-folder-modal" class="modal">
        <div class="delete-folder-content">
            <h3>Eliminar carpeta</h3>
            <p>Las tareas serán movidas a la página principal.</p>
            <div class="delete-folder-buttons">
                <button id="confirm-delete-folder" class="btn-confirm-delete">Eliminar</button>
                <button onclick="closeDeleteFolderModal()" class="btn-cancel-delete">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="edit-folder-modal" class="modal">
        <div class="modal-content edit-folder-content">
            <button onclick="closeEditFolderModal()" class="close-btn-alt">✖</button>
            <h2 class="edit-folder-title">Editar Carpeta</h2>
            
            <div class="edit-folder-input-group">
                <label>Nuevo nombre de la carpeta:</label>
                <input type="text" id="edit-folder-input" class="edit-input">
            </div>

            <div class="edit-folder-buttons">
                <button onclick="saveEditFolder()" class="btn-modal-save">Guardar</button>
                <button onclick="closeEditFolderModal()" class="btn-modal-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal">
        <div class="modal-content glass-card theme-modal-content">
            <span class="close-btn" onclick="closeThemeModal()">&times;</span>
            <h2 class="theme-title">Apariencia</h2>
            
            <button onclick="toggleThemeList()" class="btn-folder-manager dropdown-btn">
                <span>🎨 Temas Predeterminados</span>
                <span id="theme-dropdown-icon" class="dropdown-icon">▼</span>
            </button>
            
            <div id="theme-list-container" class="dropdown-list">
                <button onclick="changeTheme('tema-oceano')" class="btn-move-folder theme-option-btn">🌊 Océano Profundo</button>
                <button onclick="changeTheme('tema-lluvia')" class="btn-move-folder theme-option-btn">🌧️ Tarde Lluviosa</button>
                <button onclick="changeTheme('tema-nieve')" class="btn-move-folder theme-option-btn">❄️ Nevado</button>
            </div>

            <button onclick="toggleCustomList()" class="btn-folder-manager dropdown-btn">
                <span>⚙️ Personalización</span>
                <span id="custom-dropdown-icon" class="dropdown-icon">▼</span>
            </button>
            
            <div id="custom-list-container" class="dropdown-list text-left">
                <div class="color-picker-row">
                    <label class="custom-label">Fondo Principal:</label>
                    <input type="color" id="color-app-bg" oninput="applyCustomColors()" class="custom-color-input">
                </div>
                
                <div class="color-picker-row">
                    <label class="custom-label">Fondo de Tareas:</label>
                    <input type="color" id="color-task-bg" oninput="applyCustomColors()" class="custom-color-input">
                </div>

                <div class="color-picker-row">
                    <label class="custom-label">Botones:</label>
                    <input type="color" id="color-btn-bg" oninput="applyCustomColors()" class="custom-color-input">
                </div>

                <hr class="custom-divider">

                <div class="color-picker-row">
                    <label class="custom-label">Tamaño de Letra:</label>
                    <div style="display: flex; gap: 5px;">
                        <button onclick="changeFontSize(-1)" class="btn-move-folder btn-font-size">A-</button>
                        <button onclick="changeFontSize(1)" class="btn-move-folder btn-font-size">A+</button>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

<div id="easter-egg-modal" class="modal">
        <div class="modal-content glass-card" style="text-align: center; max-width: 320px; border: 2px solid rgba(255, 255, 255, 0.8);">
            <span class="close-btn" onclick="closeEasterEgg()">&times;</span>
            <h2 style="font-size: 2.5rem; margin: 10px 0;">⛄</h2>
            <h3 style="font-size: 1.5rem; font-weight: 700; color: white; margin: 0;">¡Secreto Descubierto!</h3>
            <p style="font-size: 1.2rem; font-weight: bold; color: #A9B1E6; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px;">
                Yoxz estuvo aquí
            </p>
        </div>
</div>
    <script src="app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
