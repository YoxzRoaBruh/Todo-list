<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Fondo.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <!-- temas -->

<div id="tema-oceano" class="dynamic-bg active-bg">
    <div class="burbujas">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>
</div>

<div id="tema-lluvia" class="dynamic-bg">
    <div class="shuvia"></div>
    </div>

<div id="tema-nieve" class="dynamic-bg">
    <div class="Lluvia-nieve"></div>
    <div class="muñeco-contenedor">
        <div class="cuerpo base"></div>
        <div class="cuerpo medio"></div>
        <div class="cuerpo cabeza">
            <div class="ojo ojo-izq"></div><div class="ojo ojo-der"></div><div class="nariz"></div>
        </div>
        <div class="sombrero"></div><div class="bufanda"></div>
    </div>
    <div class="suelo-nieve"></div>
</div>
    <button id="theme-btn" onclick="openThemeModal()" title="Cambiar Entorno" 
        style="position: fixed !important; top: 20px !important; right: 20px !important; z-index: 999999 !important; width: 45px; height: 45px; font-size: 1.4rem; background: rgba(255,255,255,0.2); border: 1.5px solid white; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; padding: 0;">
        🎨
    </button>

    <div class="glass-container">
        
        <header>
            <h1>Mis Tareas</h1>
        </header>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="¿Qué vamos a hacer hoy?">
                <button id="add-btn">CREAR</button>
            </div>
            <div id="char-count" class="char-count">0 / 100</div>
            <div class="selectors-row">
                <select id="category-select" class="compact-select">
                    <option value="📚 Estudios">📚 Estudios</option>
                    <option value="🏠 Hogar">🏠 Hogar</option>
                    <option value="💼 Trabajo">💼 Trabajo</option>
                </select>

                <select id="priority-select" class="compact-select">
                    <option value="Alta">🔴 Alta</option>
                    <option value="Media" selected>🟡 Media</option>
                    <option value="Baja">🟢 Baja</option>
                </select>
                <button id="filter-btn" class="toggle-filter">Incompletas</button>
                <button id="view-btn" class="toggle-view">⊞</button>


                </select>
         </div>

            <div class="folder-header" style="margin-top: 10px;">
    <button onclick="openFolderManager()" class="btn-folder-manager">📂 Mis Carpetas</button>
</div>

<div id="folder-manager-modal" class="modal">
    <div class="modal-content glass-card" style="max-width: 500px;">
        <div class="modal-header">
            <h2>Gestión de Carpetas</h2>
            <span class="close-btn" onclick="closeFolderManager()">&times;</span>
        </div>
        <div id="folder-manager-list" class="folder-grid">
            </div>
        <button onclick="createFolder()" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 15px; border: none; background: white; color: #8990E1; font-weight: bold; cursor: pointer;">
            + Crear Nueva Carpeta
        </button>
    </div>
</div>

        <main id="todo-list" class="task-list">
            </main>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Detalles de Tarea</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div id="modal-body">
                </div>
        </div>
    </div>
 <!-- MODAL CREAR CARPETA -->
<div id="folder-modal" class="modal">
    <div class="folder-modal-content">
        
        <h3>Nueva Carpeta</h3>

        <label>Nombre de la carpeta:</label>
        <input id="folder-name-input" type="text" maxlength="30" class="folder-input">

        <h4>Seleccionar tareas:</h4>
        <div id="folder-task-list" class="folder-task-list">
            <!-- Se llena desde JS -->
        </div>

        <div class="folder-modal-buttons">
            <button id="folder-create-btn" class="folder-btn-create">Crear</button>
            <button id="folder-cancel-btn" class="folder-btn-cancel">Cancelar</button>
        </div>

    </div>
</div>
<div id="delete-folder-modal" class="modal">
    <div class="delete-folder-content">
        <h3>Eliminar carpeta</h3>
        <p>Las tareas serán movidas a la página principal.</p>

        <div class="delete-folder-buttons">
            <button id="confirm-delete-folder" class="btn-confirm-delete">Eliminar</button>
            <button onclick="closeDeleteFolderModal()" class="btn-cancel-delete">Cancelar</button>
        </div>
    </div>
</div>
<!-- modal para editar carpetas-->
<div id="edit-folder-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center; z-index: 1000;">
    
    <div style="background: #8990E1; width: 90%; max-width: 400px; border-radius: 20px; padding: 25px; position: relative; box-sizing: border-box; color: white; font-family: 'Poppins', sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        
        <button onclick="closeEditFolderModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; font-weight: bold;">✖</button>
        
        <h2 style="margin-top: 0; text-align: center; font-size: 1.4rem;">Editar Carpeta</h2>
        
        <div style="margin-bottom: 25px;">
            <label style="font-size: 0.85rem; opacity: 0.9; margin-bottom: 8px; display: block;">Nuevo nombre de la carpeta:</label>
            <input type="text" id="edit-folder-input" style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: rgba(255, 255, 255, 0.2); color: white; font-size: 1rem; box-sizing: border-box; outline: none; transition: background 0.3s;">
        </div>

        <div style="display: flex; gap: 12px;">
            <button onclick="saveEditFolder()" style="flex: 1; padding: 12px; border-radius: 15px; border: none; background: #FFFFFF; color: #8990E1; font-weight: bold; cursor: pointer; font-size: 1rem; transition: transform 0.1s;">
                Guardar
            </button>
            <button onclick="closeEditFolderModal()" style="flex: 1; padding: 12px; border-radius: 15px; border: none; background: #D19494; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: transform 0.1s;">
                Cancelar
            </button>
        </div>
    </div>
</div>
<!-- modal para editar temas-->

<div id="theme-modal" class="modal">
    <div class="modal-content glass-card" style="max-width: 350px; text-align: center;">
        <span class="close-btn" onclick="closeThemeModal()">&times;</span>
        <h2 style="margin-bottom: 20px;">Apariencia</h2>
        
        <button onclick="toggleThemeList()" class="btn-folder-manager" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span>🎨 Temas Predeterminados</span>
            <span id="theme-dropdown-icon" style="font-size: 0.8rem; opacity: 0.8;">▼</span>
        </button>
        <div id="theme-list-container" style="display: none; flex-direction: column; gap: 10px; background: rgba(0, 0, 0, 0.15); padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 10px;">
            <button onclick="changeTheme('tema-oceano')" class="btn-move-folder" style="margin: 0;">🌊 Océano Profundo</button>
            <button onclick="changeTheme('tema-lluvia')" class="btn-move-folder" style="margin: 0;">🌧️ Tarde Lluviosa</button>
            <button onclick="changeTheme('tema-nieve')" class="btn-move-folder" style="margin: 0;">❄️ Nevado</button>
        </div>

        <button onclick="toggleCustomList()" class="btn-folder-manager" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span>⚙️ Personalización</span>
            <span id="custom-dropdown-icon" style="font-size: 0.8rem; opacity: 0.8;">▼</span>
        </button>
        <div id="custom-list-container" style="display: none; flex-direction: column; gap: 15px; background: rgba(0, 0, 0, 0.15); padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: left;">
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="color: white; font-size: 0.9rem;">Fondo Principal:</label>
                <input type="color" id="color-app-bg" oninput="applyCustomColors()" style="background: transparent; border: none; cursor: pointer; height: 30px;">
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="color: white; font-size: 0.9rem;">Fondo de Tareas:</label>
                <input type="color" id="color-task-bg" oninput="applyCustomColors()" style="background: transparent; border: none; cursor: pointer; height: 30px;">
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="color: white; font-size: 0.9rem;">Botones:</label>
                <input type="color" id="color-btn-bg" oninput="applyCustomColors()" style="background: transparent; border: none; cursor: pointer; height: 30px;">
            </div>

            <hr style="border: 0.5px solid rgba(255,255,255,0.2); width: 100%;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="color: white; font-size: 0.9rem;">Tamaño de Letra:</label>
                <div style="display: flex; gap: 5px;">
                    <button onclick="changeFontSize(-1)" class="btn-move-folder" style="margin: 0; padding: 5px 15px; width: auto;">A-</button>
                    <button onclick="changeFontSize(1)" class="btn-move-folder" style="margin: 0; padding: 5px 15px; width: auto;">A+</button>

                 
                </div>
            </div>
        </div>

    </div>
</div>

    <script src="app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
